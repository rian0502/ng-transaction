<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="text-secondary">Data Transaksi</h3>
    <button class="btn btn-primary">+ Tambah Transaksi</button>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>ID TRX</th>
            <th>Tanggal</th>
            <th>Item / Keterangan</th>
            <th>Tipe</th>
            <th>Nominal</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          @for (trx of transactionList; track trx.id) {
            <tr>
              <td><span class="badge bg-secondary">{{ trx.id }}</span></td>
              <td>{{ trx.date }}</td>
              <td>{{ trx.item }}</td>
              <td>
                <span class="badge" [class.bg-success]="trx.type === 'Masuk'" [class.bg-danger]="trx.type === 'Keluar'">
                  {{ trx.type }}
                </span>
              </td>
              <td>Rp {{ trx.amount | number }}</td>
              <td>
                <span class="badge" [class.bg-primary]="trx.status === 'Selesai'" [class.bg-warning]="trx.status === 'Pending'">
                  {{ trx.status }}
                </span>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="6" class="text-center text-muted py-3">Belum ada data transaksi.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
