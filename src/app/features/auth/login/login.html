<div class="card shadow-sm border-0" style="width: 100%; max-width: 400px;">
    <div class="card-body p-5">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">Sistem Manajemen</h3>
            <p class="text-muted">Silakan masuk ke akun Anda</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <div class="mb-3">
                <label class="form-label">Email Aktif</label>
                <input type="email" class="form-control" formControlName="email" placeholder="nama@email.com">
                @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
                    <small class="text-danger">Email tidak valid.</small>
                }
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" formControlName="password" placeholder="Minimal 6 karakter">
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary" [disabled]="loginForm.invalid">
                    Masuk
                </button>
            </div>

        </form>
    </div>
</div>
