<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="text-secondary">Users</h3>
    <button class="btn btn-primary">+ User</button>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
          </tr>
        </thead>
        <tbody>
          @for (user of usersList; track user.id; let i = $index) {
          <tr>
            <td>
              <span class="badge bg-secondary">
                {{ i + 1 }}
              </span>
            </td>

            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>

            <td>
              <span class="badge" [class.bg-success]="user.role === 'ADMIN'"
                [class.bg-warning]="user.role === 'CASHIER'">
                {{ user.role }}
              </span>
            </td>
          </tr>
          } @empty {
          <tr>
            <td colspan="7" class="text-center text-muted py-3">
              User data is empty
            </td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
